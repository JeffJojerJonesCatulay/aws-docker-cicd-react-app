version: 0.2

phases:
  pre_build:
    commands:
      - aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 961776040935.dkr.ecr.us-east-1.amazonaws.com
      - REPO_URI=961776040935.dkr.ecr.us-east-1.amazonaws.com/image-repo/aws-ecs-fargate-cicd-app
      - IMAGE_TAG=latest

  build:
    commands:
      - docker build -t image-repo/aws-ecs-fargate-cicd-app .
      - docker push 961776040935.dkr.ecr.us-east-1.amazonaws.com/image-repo/aws-ecs-fargate-cicd-app:latest

  post_build:
    commands:
      - printf '[{"name":"react-app","imageUri":"%s"}]' $REPO_URI:$IMAGE_TAG > imagedefinitions.json

artifacts:
  files:
    - imagedefinitions.json