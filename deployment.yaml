apiVersion: apps/v1
kind: Deployment
metadata:
  name: eks-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: eks-app
  template:
    metadata:
      labels:
        app: eks-app
    spec:
      containers:
        - name: eks-app
          image: 961776040935.dkr.ecr.us-east-1.amazonaws.com/image-repo/eks-react-app:$IMAGE_TAG
          ports:
            - containerPort: 3000