version: 0.2

env:
  variables:
    REPO_URI: 961776040935.dkr.ecr.us-east-1.amazonaws.com/image_repo/aws-docker-cicd-react-app

phases:
  pre_build:
    commands:
      - echo "Login to ECR"
      - aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 961776040935.dkr.ecr.us-east-1.amazonaws.com

  build:
    commands:
      - docker build -t aws-docker-cicd-react-app .
      - docker tag aws-docker-cicd-react-app:latest $REPO_URI:latest

  post_build:
    commands:
      - echo "Pushing image"
      - docker push $REPO_URI:latest

      - echo "$EC2_KEY" > key.pem
      - chmod 400 key.pem

      - mkdir -p ~/.ssh
      - ssh-keyscan -H 54.235.58.130 >> ~/.ssh/known_hosts

      - ssh -i key.pem ec2-user@54.235.58.130 << 'EOF'
          docker pull 961776040935.dkr.ecr.us-east-1.amazonaws.com/image_repo/aws-docker-cicd-react-app:latest
          docker stop app || true
          docker rm app || true
          docker run -d -p 80:80 --name app 961776040935.dkr.ecr.us-east-1.amazonaws.com/image_repo/aws-docker-cicd-react-app:latest
        EOF