version: 0.2

env:
  variables:
    REPO_URI: 961776040935.dkr.ecr.us-east-1.amazonaws.com/image-repo/aws-ecs-fargate-cicd-app
    IMAGE_TAG: latest

phases:
  pre_build:
    commands:
      - aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 961776040935.dkr.ecr.us-east-1.amazonaws.com

  build:
    commands:
      - docker build -t $REPO_URI:$IMAGE_TAG .
      - docker push $REPO_URI:$IMAGE_TAG

  post_build:
    commands:
      - echo "Checking variables..."
      - echo "URI is $REPO_URI"
      - echo "TAG is $IMAGE_TAG"
      - printf '[{"name":"react-app","imageUri":"%s:%s"}]' "$REPO_URI" "$IMAGE_TAG" > imagedefinitions.json
      - echo "File created. Content follows:"
      - cat imagedefinitions.json

artifacts:
  files:
    - imagedefinitions.json
